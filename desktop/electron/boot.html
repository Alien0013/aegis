<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; img-src data:; script-src 'unsafe-inline'" />
<title>AEGIS</title>
<style>
  :root{ --bg:#0a0b0e; --panel:#101218; --line:#22262f; --text:#e7e9ee; --mut:#8b93a3;
         --a:#8b5cff; --b:#5b8cff; --c:#22d3ee; --err:#ff5f56; }
  *{box-sizing:border-box;margin:0}
  html,body{height:100%}
  body{font:13px/1.5 Inter,ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
       background:radial-gradient(120% 120% at 50% 0%,#13161d 0%,var(--bg) 60%);color:var(--text);
       display:grid;place-items:center;-webkit-app-region:drag;user-select:none;overflow:hidden}
  .wrap{display:flex;flex-direction:column;align-items:center;gap:18px;width:340px;text-align:center}
  .mark{width:72px;height:72px;border-radius:18px;display:grid;place-items:center;
        background:linear-gradient(135deg,var(--a),var(--b) 55%,var(--c));color:#06080f;
        font-weight:900;font-size:38px;letter-spacing:-1px;
        box-shadow:0 14px 50px color-mix(in srgb,var(--b) 40%,transparent), inset 0 1px 0 rgba(255,255,255,.3);
        animation:float 3.2s ease-in-out infinite}
  @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
  .name{font-size:21px;font-weight:750;letter-spacing:.02em}
  .name small{display:block;color:var(--mut);font-size:12px;font-weight:500;margin-top:3px;letter-spacing:0}
  .bar{width:100%;height:4px;border-radius:4px;background:var(--line);overflow:hidden}
  .bar i{display:block;height:100%;width:8%;border-radius:4px;
         background:linear-gradient(90deg,var(--a),var(--b),var(--c));transition:width .45s ease}
  .status{color:var(--mut);font-size:12px;min-height:16px}
  .err{display:none;flex-direction:column;gap:12px;width:100%}
  .err.show{display:flex}
  .ok-only.hide{display:none}
  .errmsg{color:var(--err);font-size:12.5px;white-space:pre-wrap;max-height:120px;overflow:auto;
          background:var(--panel);border:1px solid color-mix(in srgb,var(--err) 35%,var(--line));
          border-radius:8px;padding:10px;text-align:left;font-family:ui-monospace,Menlo,monospace}
  .btns{display:flex;gap:8px;justify-content:center;-webkit-app-region:no-drag}
  button{font:inherit;cursor:pointer;border-radius:8px;padding:8px 14px;font-weight:600;font-size:12.5px;
         border:1px solid var(--line);background:var(--panel);color:var(--text)}
  button.primary{background:linear-gradient(135deg,var(--a),var(--b));border:0;color:#06080f}
  button:hover{filter:brightness(1.08)}
</style>
</head>
<body>
  <div class="wrap">
    <div class="mark">A</div>
    <div class="name">AEGIS<small id="tag">your terminal agent, as an app</small></div>
    <div class="ok-only" id="okOnly">
      <div class="bar"><i id="bar"></i></div>
    </div>
    <div class="status" id="status">Starting…</div>
    <div class="err" id="err">
      <div class="errmsg" id="errmsg"></div>
      <div class="btns">
        <button class="primary" id="retry">Retry</button>
        <button id="logs">Open logs</button>
        <button id="quit">Quit</button>
      </div>
    </div>
  </div>
<script>
  const bar = document.getElementById("bar");
  const status = document.getElementById("status");
  const err = document.getElementById("err");
  const okOnly = document.getElementById("okOnly");
  const errmsg = document.getElementById("errmsg");
  document.getElementById("retry").onclick = () => window.aegisBoot?.retry();
  document.getElementById("logs").onclick = () => window.aegisBoot?.openLogs();
  document.getElementById("quit").onclick = () => window.aegisBoot?.quit();
  window.aegisBoot?.onStatus((s) => {
    if (s.error) {
      err.classList.add("show"); okOnly.classList.add("hide");
      status.textContent = "Couldn't start AEGIS";
      errmsg.textContent = s.error;
      return;
    }
    err.classList.remove("show"); okOnly.classList.remove("hide");
    if (typeof s.pct === "number") bar.style.width = Math.max(6, Math.min(100, s.pct)) + "%";
    if (s.message) status.textContent = s.message;
  });
</script>
</body>
</html>
