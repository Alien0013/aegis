name: Release

# Publishes to PyPI on a version tag (vX.Y.Z), or to TestPyPI on manual dispatch.
#
# Uses PyPI **Trusted Publishing** (OIDC) — no API token needed. One-time setup:
#   PyPI → your project (or "pending publisher") → Publishing → Add a GitHub publisher:
#     owner=Alien0013  repo=aegis  workflow=release.yml  environment=(blank)
# (Do the same on test.pypi.org for the TestPyPI job.)

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      target:
        description: "testpypi or pypi"
        default: testpypi

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            web/package-lock.json
            desktop/package-lock.json
      - name: Install web and desktop dependencies
        run: |
          (cd web && npm ci)
          (cd desktop && npm ci)
      - name: Full release gate
        run: pip install -e ".[dev]" && bash scripts/verify_all.sh

  build-and-publish:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      id-token: write          # for trusted publishing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Verify dashboard bundle
        run: scripts/check_web_dist.sh
      - name: Build
        run: |
          pip install build
          python -m build
      - name: Generate Python artifact provenance
        run: python scripts/release_provenance.py --artifact-dir dist --out release-provenance/python
      - name: Verify Python artifact provenance
        run: python scripts/release_provenance.py --artifact-dir dist --out release-provenance/python --check
      - name: Upload Python provenance
        uses: actions/upload-artifact@v4
        with:
          name: aegis-python-provenance
          path: release-provenance/python/*
      - name: Publish to TestPyPI (trusted publishing)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'testpypi'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
      - name: Publish to PyPI (trusted publishing)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: pypa/gh-action-pypi-publish@release/v1

  desktop-linux:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: desktop/package-lock.json
      - name: Install Linux packaging dependencies
        run: sudo apt-get update && sudo apt-get install -y rpm
      - name: Install desktop dependencies
        working-directory: desktop
        run: npm ci
      - name: Stage desktop backend venv
        run: |
          python -m venv desktop/build/ci-backend
          desktop/build/ci-backend/bin/python -m pip install --upgrade pip
          desktop/build/ci-backend/bin/python -m pip install .
          cat > desktop/build/ci-backend/bin/aegis <<'SH'
          #!/usr/bin/env bash
          set -euo pipefail
          DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
          exec "$DIR/python" -m aegis.cli.main "$@"
          SH
          chmod +x desktop/build/ci-backend/bin/aegis
      - name: Build Linux desktop artifacts
        working-directory: desktop
        env:
          AEGIS_RELEASE: "1"
          AEGIS_DESKTOP_BACKEND_SOURCE: build/ci-backend
          AEGIS_DESKTOP_TARGETS: linux
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run dist:linux
      - name: Generate desktop artifact provenance
        run: python scripts/release_provenance.py --artifact-dir desktop/release --out desktop/release
      - name: Verify desktop artifact provenance
        run: python scripts/release_provenance.py --artifact-dir desktop/release --out desktop/release --check
      - name: Upload desktop workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: aegis-desktop-linux
          path: desktop/release/*
      - name: Upload desktop artifacts to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: desktop/release/*

  desktop-windows:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: windows-latest
    permissions:
      contents: write
    env:
      CSC_LINK: ${{ secrets.DESKTOP_WINDOWS_CSC_LINK }}
      CSC_KEY_PASSWORD: ${{ secrets.DESKTOP_WINDOWS_CSC_KEY_PASSWORD }}
      CSC_NAME: ${{ secrets.DESKTOP_WINDOWS_CSC_NAME }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: desktop/package-lock.json
      - name: Install desktop dependencies
        working-directory: desktop
        run: npm ci
      - name: Stage desktop backend venv
        shell: pwsh
        run: |
          python -m venv desktop/build/ci-backend
          desktop/build/ci-backend/Scripts/python -m pip install --upgrade pip
          desktop/build/ci-backend/Scripts/python -m pip install .
          $script = @'
          @echo off
          "%~dp0python.exe" -m aegis.cli.main %*
          '@
          Set-Content -Path desktop/build/ci-backend/Scripts/aegis.cmd -Value $script
      - name: Select Windows signing policy
        shell: pwsh
        run: |
          if ($env:CSC_LINK -or $env:CSC_NAME) {
            "AEGIS_ALLOW_UNSIGNED_DESKTOP_RELEASE=" >> $env:GITHUB_ENV
            "CSC_IDENTITY_AUTO_DISCOVERY=" >> $env:GITHUB_ENV
          } else {
            "AEGIS_ALLOW_UNSIGNED_DESKTOP_RELEASE=1" >> $env:GITHUB_ENV
            "CSC_IDENTITY_AUTO_DISCOVERY=false" >> $env:GITHUB_ENV
          }
      - name: Build Windows desktop artifacts
        working-directory: desktop
        env:
          AEGIS_RELEASE: "1"
          AEGIS_DESKTOP_BACKEND_SOURCE: build/ci-backend
          AEGIS_DESKTOP_TARGETS: win
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run dist:win
      - name: Generate desktop artifact provenance
        run: python scripts/release_provenance.py --artifact-dir desktop/release --out desktop/release
      - name: Verify desktop artifact provenance
        run: python scripts/release_provenance.py --artifact-dir desktop/release --out desktop/release --check
      - name: Upload desktop workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: aegis-desktop-windows
          path: desktop/release/*
      - name: Upload desktop artifacts to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: desktop/release/*

  desktop-macos:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: macos-latest
    permissions:
      contents: write
    env:
      CSC_LINK: ${{ secrets.DESKTOP_MAC_CSC_LINK }}
      CSC_KEY_PASSWORD: ${{ secrets.DESKTOP_MAC_CSC_KEY_PASSWORD }}
      CSC_NAME: ${{ secrets.DESKTOP_MAC_CSC_NAME }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
      APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
      APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: desktop/package-lock.json
      - name: Install desktop dependencies
        working-directory: desktop
        run: npm ci
      - name: Stage desktop backend venv
        run: |
          python -m venv desktop/build/ci-backend
          desktop/build/ci-backend/bin/python -m pip install --upgrade pip
          desktop/build/ci-backend/bin/python -m pip install .
          cat > desktop/build/ci-backend/bin/aegis <<'SH'
          #!/usr/bin/env bash
          set -euo pipefail
          DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
          exec "$DIR/python" -m aegis.cli.main "$@"
          SH
          chmod +x desktop/build/ci-backend/bin/aegis
      - name: Select macOS signing and notarization policy
        run: |
          has_signing=0
          has_notary=0
          if [ -n "${CSC_LINK}${CSC_NAME}" ]; then has_signing=1; fi
          if [ -n "${APPLE_ID}" ] && [ -n "${APPLE_APP_SPECIFIC_PASSWORD}" ] && [ -n "${APPLE_TEAM_ID}" ]; then has_notary=1; fi
          if [ -n "${APPLE_API_KEY}" ] && [ -n "${APPLE_API_KEY_ID}" ] && [ -n "${APPLE_API_ISSUER}" ]; then has_notary=1; fi
          if [ "$has_signing" = "1" ] && [ "$has_notary" = "1" ]; then
            echo "AEGIS_ALLOW_UNSIGNED_DESKTOP_RELEASE=" >> "$GITHUB_ENV"
            echo "CSC_IDENTITY_AUTO_DISCOVERY=" >> "$GITHUB_ENV"
          else
            echo "AEGIS_ALLOW_UNSIGNED_DESKTOP_RELEASE=1" >> "$GITHUB_ENV"
            echo "CSC_IDENTITY_AUTO_DISCOVERY=false" >> "$GITHUB_ENV"
          fi
      - name: Build macOS desktop artifacts
        working-directory: desktop
        env:
          AEGIS_RELEASE: "1"
          AEGIS_DESKTOP_BACKEND_SOURCE: build/ci-backend
          AEGIS_DESKTOP_TARGETS: mac
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run dist:mac
      - name: Generate desktop artifact provenance
        run: python scripts/release_provenance.py --artifact-dir desktop/release --out desktop/release
      - name: Verify desktop artifact provenance
        run: python scripts/release_provenance.py --artifact-dir desktop/release --out desktop/release --check
      - name: Upload desktop workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: aegis-desktop-macos
          path: desktop/release/*
      - name: Upload desktop artifacts to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: desktop/release/*
