name: Release

# Publishes to PyPI on a version tag (vX.Y.Z), or to TestPyPI on manual dispatch.
# Set repository secrets: PYPI_API_TOKEN (and TEST_PYPI_API_TOKEN for TestPyPI).

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      target:
        description: "testpypi or pypi"
        default: testpypi

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]" && pytest -q

  build-and-publish:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      id-token: write          # for trusted publishing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build
        run: |
          pip install build
          python -m build
      - name: Publish to TestPyPI
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'testpypi'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          password: ${{ secrets.TEST_PYPI_API_TOKEN }}
      - name: Publish to PyPI
        if: startsWith(github.ref, 'refs/tags/v')
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
