name: Release

# Publishes to PyPI on a version tag (vX.Y.Z), or to TestPyPI on manual dispatch.
#
# Uses PyPI **Trusted Publishing** (OIDC) — no API token needed. One-time setup:
#   PyPI → your project (or "pending publisher") → Publishing → Add a GitHub publisher:
#     owner=Alien0013  repo=aegis  workflow=release.yml  environment=(blank)
# (Do the same on test.pypi.org for the TestPyPI job.)

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      target:
        description: "testpypi or pypi"
        default: testpypi

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]" && bash scripts/run_tests.sh

  build-and-publish:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      id-token: write          # for trusted publishing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Verify dashboard bundle
        run: scripts/check_web_dist.sh
      - name: Build
        run: |
          pip install build
          python -m build
      - name: Publish to TestPyPI (trusted publishing)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'testpypi'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
      - name: Publish to PyPI (trusted publishing)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: pypa/gh-action-pypi-publish@release/v1

  desktop-linux:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: desktop/package-lock.json
      - name: Install Linux packaging dependencies
        run: sudo apt-get update && sudo apt-get install -y rpm
      - name: Install desktop dependencies
        working-directory: desktop
        run: npm ci
      - name: Stage desktop backend venv
        run: |
          python -m venv desktop/build/ci-backend
          desktop/build/ci-backend/bin/python -m pip install --upgrade pip
          desktop/build/ci-backend/bin/python -m pip install .
          cat > desktop/build/ci-backend/bin/aegis <<'SH'
          #!/usr/bin/env bash
          set -euo pipefail
          DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
          exec "$DIR/python" -m aegis.cli.main "$@"
          SH
          chmod +x desktop/build/ci-backend/bin/aegis
      - name: Build Linux desktop artifacts
        working-directory: desktop
        env:
          AEGIS_RELEASE: "1"
          AEGIS_DESKTOP_BACKEND_SOURCE: build/ci-backend
          AEGIS_DESKTOP_TARGETS: linux
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run dist:linux
      - name: Upload desktop workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: aegis-desktop-linux
          path: desktop/release/*
      - name: Upload desktop artifacts to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: desktop/release/*
