name: "Setup Nix"
description: "Install Nix and configure the AEGIS binary cache"

inputs:
  cachix-auth-token:
    description: "Cachix auth token for cache pushes. Omit for read-only cache use."
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Install Nix
      uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25

    - name: Configure Cachix cache
      uses: cachix/cachix-action@1eb2ef646ac0255473d23a5907ad7b04ce94065c
      with:
        name: aegis-agent
        authToken: ${{ inputs.cachix-auth-token }}
      continue-on-error: true
