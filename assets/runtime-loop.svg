<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="540" viewBox="0 0 1120 540" role="img" aria-label="AEGIS runtime loop">
  <defs>
    <linearGradient id="lbg" x1="0" y1="0" x2="1120" y2="540" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#191b20"/>
      <stop offset="1" stop-color="#121317"/>
    </linearGradient>
    <marker id="la" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0 0 9 4.5 0 9z" fill="#d6a15e"/>
    </marker>
    <style>
      .title{font:800 33px Inter,ui-sans-serif,Segoe UI,sans-serif;fill:#f3f1e8}
      .sub{font:500 15px Inter,ui-sans-serif,Segoe UI,sans-serif;fill:#8f968f}
      .n{font:700 16px Inter,ui-sans-serif,Segoe UI,sans-serif;fill:#f3f1e8}
      .d{font:500 12.5px Inter,ui-sans-serif,Segoe UI,sans-serif;fill:#b9c0bb}
      .k{font:700 13px Inter,ui-sans-serif,Segoe UI,sans-serif;fill:#d6a15e}
      .step{fill:#22252c;stroke:#3a3f47;stroke-width:1.3}
      .flow{stroke:#d6a15e;stroke-width:2;fill:none;marker-end:url(#la);opacity:.85}
    </style>
  </defs>
  <rect width="1120" height="540" rx="22" fill="url(#lbg)"/>
  <rect x="2" y="2" width="1116" height="536" rx="21" fill="none" stroke="#2b2f36"/>
  <text x="56" y="62" class="title">The agent loop</text>
  <text x="56" y="90" class="sub">Every surface runs the same bounded loop — build context, route, act through policy, persist, review.</text>

  <g>
    <rect x="56" y="130" width="220" height="118" rx="16" class="step"/>
    <text x="80" y="162" class="k">1 · CONTEXT</text>
    <text x="80" y="188" class="n">Build the prompt</text>
    <text x="80" y="212" class="d">Rules, memory, skills,</text>
    <text x="80" y="230" class="d">@file/@diff/@url refs, history.</text>

    <rect x="332" y="130" width="220" height="118" rx="16" class="step"/>
    <text x="356" y="162" class="k">2 · ROUTE</text>
    <text x="356" y="188" class="n">Call the provider</text>
    <text x="356" y="212" class="d">Selected model, prompt cache,</text>
    <text x="356" y="230" class="d">fallback chain, cost caps.</text>

    <rect x="608" y="130" width="220" height="118" rx="16" class="step"/>
    <text x="632" y="162" class="k">3 · ACT</text>
    <text x="632" y="188" class="n">Run tool calls</text>
    <text x="632" y="212" class="d">Permission gate, sandbox,</text>
    <text x="632" y="230" class="d">untrusted-output wrapping.</text>

    <rect x="884" y="130" width="180" height="118" rx="16" class="step"/>
    <text x="908" y="162" class="k">4 · STREAM</text>
    <text x="908" y="188" class="n">Emit events</text>
    <text x="908" y="212" class="d">Deltas, tool cards,</text>
    <text x="908" y="230" class="d">status, to every surface.</text>
  </g>

  <g>
    <rect x="608" y="318" width="220" height="118" rx="16" class="step"/>
    <text x="632" y="350" class="k">5 · PERSIST</text>
    <text x="632" y="376" class="n">Save the turn</text>
    <text x="632" y="400" class="d">Session, traces, usage,</text>
    <text x="632" y="418" class="d">checkpoints, cost.</text>

    <rect x="332" y="318" width="220" height="118" rx="16" class="step"/>
    <text x="356" y="350" class="k">6 · REVIEW</text>
    <text x="356" y="376" class="n">Learn from it</text>
    <text x="356" y="400" class="d">Memory &amp; skill candidates,</text>
    <text x="356" y="418" class="d">curator, self-improve.</text>

    <rect x="56" y="318" width="220" height="118" rx="16" class="step"/>
    <text x="80" y="350" class="k">7 · LOOP</text>
    <text x="80" y="376" class="n">Until done</text>
    <text x="80" y="400" class="d">Iterate within governance</text>
    <text x="80" y="418" class="d">&amp; budget, or stop on goal.</text>
  </g>

  <path d="M276 189h52" class="flow"/>
  <path d="M552 189h52" class="flow"/>
  <path d="M828 189h52" class="flow"/>
  <path d="M974 248v22c0 14-12 26-26 26H828" class="flow"/>
  <path d="M608 377h-52" class="flow"/>
  <path d="M332 377h-52" class="flow"/>
  <path d="M166 318c0-40 0-48 0-48 0-14 10-22 24-22h62" class="flow"/>

  <text x="56" y="500" class="d" style="fill:#8f968f">Tool calls in step 3 can loop back through steps 2–3 many times before the turn completes.</text>
</svg>
