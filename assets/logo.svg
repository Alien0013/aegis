<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" role="img" aria-label="AEGIS logo">
  <defs>
    <linearGradient id="tile" x1="40" y1="32" x2="216" y2="224" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#181c22"/>
      <stop offset="1" stop-color="#0a0c0f"/>
    </linearGradient>
    <linearGradient id="aegis" x1="78" y1="56" x2="178" y2="208" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f2c878"/>
      <stop offset="0.55" stop-color="#d8913f"/>
      <stop offset="1" stop-color="#7ecf8f"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- tile -->
  <rect x="16" y="16" width="224" height="224" rx="54" fill="url(#tile)"/>
  <rect x="17.5" y="17.5" width="221" height="221" rx="52.5" fill="none" stroke="#2c333d" stroke-width="1.5"/>

  <!-- shield (the aegis) -->
  <path d="M128 50 196 76 V128 C196 168 166 196 128 210 C90 196 60 168 60 128 V76 Z"
        fill="url(#aegis)" filter="url(#soft)"/>
  <path d="M128 50 196 76 V128 C196 168 166 196 128 210 C90 196 60 168 60 128 V76 Z"
        fill="none" stroke="#0a0c0f" stroke-width="2" opacity="0.25"/>

  <!-- terminal prompt knocked out of the shield: >_ -->
  <path d="M104 104 L128 128 L104 152" fill="none" stroke="#14100a" stroke-width="13"
        stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M134 152 H158" fill="none" stroke="#14100a" stroke-width="13" stroke-linecap="round"/>
</svg>
