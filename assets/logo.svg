<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200" role="img" aria-label="AEGIS">
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8b5cff"/>
      <stop offset=".55" stop-color="#5b8cff"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity=".22"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- app tile -->
  <rect width="200" height="200" rx="44" fill="#0b0c10"/>
  <rect x="1" y="1" width="198" height="198" rx="43" fill="none" stroke="url(#grad)" stroke-opacity=".25"/>
  <!-- shield -->
  <g filter="url(#glow)">
    <path d="M100 30 L154 50 V96 C154 128 130 150 100 162 C70 150 46 128 46 96 V50 Z"
          fill="none" stroke="url(#grad)" stroke-width="7" stroke-linejoin="round"/>
  </g>
  <path d="M100 30 L154 50 V96 C154 128 130 150 100 162 C70 150 46 128 46 96 V50 Z" fill="url(#sheen)"/>
  <!-- monogram A formed inside the shield -->
  <path d="M100 60 L124 126 H112 L107 112 H93 L88 126 H76 Z M97 100 H103 L100 86 Z"
        fill="url(#grad)"/>
  <!-- core spark -->
  <circle cx="100" cy="74" r="4.5" fill="#fff"/>
</svg>
